<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Tableau blanc</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; overflow: hidden; }
    #app { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import React from "https://esm.sh/react@18.2.0"
    import ReactDOM from "https://esm.sh/react-dom@18.2.0/client"
    import { Excalidraw } from "https://esm.sh/@excalidraw/excalidraw@0.17.6"

    let excalidrawAPI = null

    function App() {
      return React.createElement(Excalidraw, {
        excalidrawAPI: (api) => {
          excalidrawAPI = api
          window.parent.postMessage({ type: "wb-ready" }, "*")
        },
        onChange: (elements, appState) => {
          if (window._syncing) return
          window.parent.postMessage({
            type: "wb-change",
            elements: JSON.parse(JSON.stringify(elements))
          }, "*")
        },
        viewModeEnabled: window.location.search.includes("readonly=true"),
        gridModeEnabled: true,
        theme: "light",
        langCode: "fr-FR",
        UIOptions: {
          canvasActions: {
            export: false,
            loadScene: false,
            saveToActiveFile: false,
          }
        }
      })
    }

    // Recevoir les mises à jour depuis le parent
    window.addEventListener("message", (e) => {
      if (e.data.type === "wb-update" && excalidrawAPI) {
        window._syncing = true
        excalidrawAPI.updateScene({ elements: e.data.elements })
        setTimeout(() => { window._syncing = false }, 150)
      }
      if (e.data.type === "wb-clear" && excalidrawAPI) {
        window._syncing = true
        excalidrawAPI.updateScene({ elements: [] })
        setTimeout(() => { window._syncing = false }, 150)
      }
    })

    const root = ReactDOM.createRoot(document.getElementById("app"))
    root.render(React.createElement(App))
  </script>
</body>
</html>
